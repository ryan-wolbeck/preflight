<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="36%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#1B3A62"/>
      <stop offset="60%" stop-color="#0D1F3C"/>
      <stop offset="100%" stop-color="#060D1A"/>
    </radialGradient>
    <radialGradient id="badgeGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </radialGradient>
    <filter id="planeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="badgeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="bgGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Subtle outer ring highlight -->
  <circle cx="256" cy="256" r="253" fill="none"
          stroke="rgba(255,255,255,0.07)" stroke-width="2"/>

  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="210" fill="none"
          stroke="rgba(255,255,255,0.035)" stroke-width="1"/>

  <!-- Airplane — top-view, pointing NE (rotate 45 from north)
       Scale: 1.3× base design. Coordinates in plane-local frame, centered at origin. -->
  <g transform="translate(256,256) rotate(45)" filter="url(#planeShadow)">

    <!-- Fuselage (smooth elongated lens shape) -->
    <path d="M 0,-123
             C 18,-97 18,-36 18,10
             C 18,58 12,83 0,98
             C -12,83 -18,58 -18,10
             C -18,-36 -18,-97 0,-123 Z"
          fill="rgba(255,255,255,0.96)"/>

    <!-- Left wing (swept delta, commercial jet style) -->
    <path d="M -12,-8 L -143,57 L -17,35 Z"
          fill="rgba(255,255,255,0.96)"/>

    <!-- Right wing -->
    <path d="M 12,-8 L 143,57 L 17,35 Z"
          fill="rgba(255,255,255,0.96)"/>

    <!-- Left horizontal stabilizer -->
    <path d="M -8,80 L -58,115 L -10,92 Z"
          fill="rgba(255,255,255,0.96)"/>

    <!-- Right horizontal stabilizer -->
    <path d="M 8,80 L 58,115 L 10,92 Z"
          fill="rgba(255,255,255,0.96)"/>

    <!-- Wing shading line (gives depth) -->
    <line x1="-12" y1="-8" x2="-143" y2="57"
          stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
    <line x1="12" y1="-8" x2="143" y2="57"
          stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
  </g>

  <!-- Green checkmark badge — bottom-right quadrant -->
  <g filter="url(#badgeShadow)">
    <!-- Dark ring (creates separation from main circle) -->
    <circle cx="388" cy="388" r="80" fill="#060D1A"/>
    <!-- Green fill -->
    <circle cx="388" cy="388" r="70" fill="url(#badgeGrad)"/>
    <!-- Subtle inner highlight -->
    <circle cx="388" cy="388" r="70" fill="none"
            stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <!-- Checkmark path -->
    <path d="M 358,388 L 380,412 L 422,364"
          fill="none" stroke="white" stroke-width="14"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
