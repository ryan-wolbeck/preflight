name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Matrix test: Python 3.9, 3.10, 3.11, 3.12 on Ubuntu, macOS, Windows
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Test Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          PYTHONWARNINGS: error
        run: python -m pytest tests/ -v --tb=short -W error --cov=preflight --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────
  # Conda-based install test (mirrors what `make env && make test` does)
  # ─────────────────────────────────────────────────────────────────────────
  conda-test:
    name: Conda install test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: preflight
          environment-file: environment.yml
          auto-activate-base: false
          miniforge-variant: Mambaforge
          use-mamba: true

      - name: Run tests in conda env
        shell: bash -el {0}
        env:
          PYTHONWARNINGS: error
        run: |
          conda activate preflight
          python -m pytest tests/ -v --tb=short -W error

  # ─────────────────────────────────────────────────────────────────────────
  # Quality checks (non-blocking): formatting + type checking
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Quality (black + mypy)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install quality tools
        run: pip install -e ".[dev]"

      - name: Check formatting (black)
        run: black --check --diff preflight/ tests/

      - name: Type check (mypy)
        run: mypy preflight/

  # ─────────────────────────────────────────────────────────────────────────
  # Build check — ensure the package builds cleanly before any release
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate package with twine
        run: twine check dist/*

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
